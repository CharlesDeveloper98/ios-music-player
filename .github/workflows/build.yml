name: Generate Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          # Changed ID to com.charles.music and Name to "Music"
          cordova create myApp com.charles.music "Music"
          rm -rf myApp/www/*
          cp -r index.html myApp/www/
          # Copy your CSS, JS, and image folders if you have them:
          # cp -r style.css script.js myApp/www/
          # cp -r assets myApp/www/ 

      - name: Setup Android Platform
        run: |
          cd myApp
          cordova platform add android

      - name: Compile APK
        run: |
          cd myApp
          cordova build android --debug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Music-APK
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
