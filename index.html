<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <title>iOS Music Player</title>
</head>
<body>

    <div id="content">
        <div id="page-home" class="page active">
            <div class="header-row">
                <h1 class="page-title">Home</h1>
                <div class="profile-container" onclick="openSettings()">
                    <i data-lucide="user"></i>
                </div>
            </div>
        </div>

        <div id="page-new" class="page">
            <div class="header-row">
                <h1>New</h1>
            </div>
        </div>

        <div id="page-library" class="page">
            <div class="header-row">
                <h1 class="page-title">Library</h1>
                <div id="done-container" class="done-container" onclick="toggleEditMode(false)">
                    <i data-lucide="check"></i>
                </div>
                
                <div class="header-right-group" id="library-actions">
                    <div class="glass-header-actions" id="header-glass">
                        <i data-lucide="library-big"></i>
                        <i data-lucide="more-horizontal" class="clickable-icon" onclick="togglePopup()"></i>
                    </div>
                    <div class="profile-container" onclick="openSettings()">
                        <i data-lucide="user"></i>
                    </div>
                </div>
            </div>

            <div class="library-menu" id="library-menu">
                </div>
        </div>

        <div id="page-detail" class="page">
            <div class="header-row">
                <div class="back-btn" onclick="backToLibrary()">
                    <i data-lucide="chevron-left"></i>
                </div>
            </div>
            <h1 class="page-title" id="detail-title">Title</h1>
        </div>

        <div id="page-search" class="page">
            <div class="header-row">
                <h1>Search</h1>
            </div>
        </div>
    </div>

    <div id="settings-overlay" class="settings-overlay" onclick="closeSettings()"></div>
    <div class="settings-modal" id="settings-modal">
        <div class="settings-header">
            <h2>Settings</h2>
            <div class="close-x" onclick="closeSettings()"><i data-lucide="x"></i></div>
        </div>

        <div class="settings-group-label">Profile</div>
        <div class="settings-card">
            <div class="profile-section" onclick="openEditProfile()">
                <div class="avatar-placeholder"><i data-lucide="user"></i></div>
                <div class="profile-info">
                    <div class="title">Unknown ID</div>
                    <div class="subtitle">Account Information</div>
                </div>
                <i data-lucide="chevron-right" class="nav-arrow"></i>
            </div>
            <div class="divider"></div>
            <div class="edit-section" onclick="openEditProfile()">
                <div class="badge"><i data-lucide="user"></i></div>
                <div class="edit-info"><div class="name-text">Enter Details</div></div>
                <div class="edit-btn">Edit</div>
            </div>
        </div>

        <div class="settings-group-label">User Interface</div>
        <div class="settings-card">
            <div class="settings-item" onclick="openUI()">
                <span>Appearance</span>
                <i data-lucide="chevron-right" class="nav-arrow"></i>
            </div>
        </div>
    </div>

    <div id="ui-overlay" class="settings-overlay" onclick="closeUI()"></div>
    <div class="settings-modal ui-modal" id="ui-modal">
        <div class="settings-header">
            <div class="back-btn-header" onclick="closeUI()"><i data-lucide="chevron-left"></i> Back</div>
            <h2>Theme</h2>
            <div style="width: 40px;"></div>
        </div>
        <div class="settings-card">
            <div class="settings-item" onclick="setTheme('System')">
                <span>System</span>
                <i data-lucide="check" class="theme-ticker" id="ticker-System"></i>
            </div>
            <div class="divider"></div>
            <div class="settings-item" onclick="setTheme('Light')">
                <span>Light</span>
                <i data-lucide="check" class="theme-ticker" id="ticker-Light" style="display:none;"></i>
            </div>
            <div class="divider"></div>
            <div class="settings-item" onclick="setTheme('Dark')">
                <span>Dark</span>
                <i data-lucide="check" class="theme-ticker" id="ticker-Dark" style="display:none;"></i>
            </div>
        </div>
    </div>

    <div id="edit-profile-overlay" class="settings-overlay" onclick="closeEditProfile()"></div>
    <div class="settings-modal edit-profile-modal" id="edit-profile-modal">
        <div class="settings-header">
            <div class="close-x" onclick="closeEditProfile()"><i data-lucide="x"></i></div>
            <h2>Edit Profile</h2>
            <div class="save-check" onclick="saveProfileChanges()"><i data-lucide="check"></i></div>
        </div>
        </div>

    <nav id="bottom-nav">
        </nav>

    <script src="script.js"></script>
</body>
</html>
