<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <title>iOS Music Player</title>
</head>
<body>

    <div id="content">
        <div id="page-home" class="page active"><h1>Home</h1></div>
        <div id="page-new" class="page"><h1>New</h1></div>
        <div id="page-library" class="page">
    <h1 class="page-title">Library</h1>
    
    <div class="library-menu">
        <div class="menu-item"><span>🎵</span> Playlists</div>
        <div class="menu-item"><span>🎤</span> Artists</div>
        <div class="menu-item"><span>💿</span> Albums</div>
        <div class="menu-item"><span>🎵</span> Songs</div>
        <div class="menu-item"><span>⬇️</span> Downloaded</div>
    </div>

    <h2 class="section-title">Recently Added</h2>
    <div class="album-grid">
        <div class="album">
            <div class="album-art"></div>
            <div class="album-name">Magic 2</div>
            <div class="artist-name">Nas</div>
        </div>
        <div class="album">
            <div class="album-art"></div>
            <div class="album-name">King's Disease III</div>
            <div class="artist-name">Nas</div>
        </div>
    </div>
</div>

        <div id="page-search" class="page"><h1>Search</h1></div>
    </div>

    <div id="now-playing">
        <div class="song-info">Let Down</div>
        <div class="controls">▶ ⏩</div>
    </div>

    <nav id="bottom-nav">
        <div class="nav-item" onclick="showPage('page-home', this)"><span>🏠</span><div class="nav-label">Home</div></div>
        <div class="nav-item" onclick="showPage('page-new', this)"><span>📱</span><div class="nav-label">New</div></div>
        <div class="nav-item" onclick="showPage('page-library', this)"><span>🎵</span><div class="nav-label">Library</div></div>
        <div class="nav-item" onclick="showPage('page-search', this)"><span>🔍</span><div class="nav-label">Search</div></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
