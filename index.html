<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>iOS Music Player</title>
</head>
<body>

    <div id="content">
        <div id="page-home" class="page active">
            <div class="header-row"><h1>Home</h1></div>
        </div>

        <div id="page-new" class="page">
            <div class="header-row"><h1>New</h1></div>
        </div>

        <div id="page-library" class="page">
            <div class="header-row">
                <h1 class="page-title">Library</h1>
                <div class="header-actions">
                    <span class="edit-btn" onclick="toggleEdit()" id="edit-text">Edit</span>
                </div>
            </div>
            </div>

        <div id="page-search" class="page">
            <div class="header-row"><h1>Search</h1></div>
        </div>
    </div>

    <div class="mini-player">
        <div class="mini-art"></div>
        <div class="mini-info">
            <div class="mini-title">Unknown Art</div>
        </div>
        <div class="mini-controls">
            <img src="https://img.icons8.com/ios/24/ffffff/play--v1.png" class="mini-icon">
            <img src="https://img.icons8.com/ios/24/ffffff/fast-forward.png" class="mini-icon">
        </div>
    </div>

    <nav id="bottom-nav">
        <div class="nav-item active" onclick="showPage('page-home', this)">
            <img src="https://img.icons8.com/ios/24/8e8e93/home.png" class="nav-icon">
            <div class="nav-label">Home</div>
        </div>
        <div class="nav-item" onclick="showPage('page-new', this)">
            <img src="https://img.icons8.com/ios/24/8e8e93/square.png" class="nav-icon">
            <div class="nav-label">New</div>
        </div>
        <div class="nav-item" onclick="showPage('page-library', this)">
            <img src="https://img.icons8.com/ios/24/8e8e93/music-library.png" class="nav-icon">
            <div class="nav-label">Library</div>
        </div>
        <div class="nav-item" onclick="showPage('page-search', this)">
            <img src="https://img.icons8.com/ios/24/8e8e93/search.png" class="nav-icon">
            <div class="nav-label">Search</div>
        </div>
    </nav>
</body>
</html>
