<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>iOS Music Player</title>
</head>
<body>

    <div id="content">
    <div id="page-home" class="page active-page"><h1>Home Page</h1></div>
    <div id="page-new" class="page"><h1>New Page</h1></div>
    <div id="page-library" class="page"><h1>Library Page</h1></div>
    <div id="page-search" class="page"><h1>Search</h1></div>
</div>


    <div id="now-playing">
    <div class="art">🖼️</div>
    <div class="song-info">Let Down</div>
    <div class="controls">▶ ⏩</div>
</div>


   <nav id="bottom-nav">
    <div class="nav-item active" onclick="showPage('page-home')">
        <span>🏠</span><span class="nav-label">Home</span>
    </div>
    <div class="nav-item" onclick="showPage('page-new')">
        <span>📱</span><span class="nav-label">New</span>
    </div>
    <div class="nav-item" onclick="showPage('page-library')">
        <span>🎵</span><span class="nav-label">Library</span>
    </div>
    <div class="nav-item" onclick="showPage('page-search')">
        <span>🔍</span><span class="nav-label">Search</span>
    </div>
</nav>



    <script src="script.js"></script>
</body>
</html>
