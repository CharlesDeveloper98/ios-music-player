<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <title>iOS Music Player</title>
</head>
<body>

<div id="content">
    <div id="page-home" class="page active">
        <div class="page-header">
            <h1 class="page-title">Home</h1>
            <div class="profile-container" onclick="openSettings()" oncontextmenu="triggerFileSelect(event)">
                <i data-lucide="user" class="profile-icon"></i>
            </div>
        </div>
    </div>

    <div id="page-new" class="page"><h1>New</h1></div>

    <div id="page-library" class="page">
        <div class="page-header">
            <h1 class="page-title">Library</h1>
            <div class="profile-container" onclick="openSettings()" oncontextmenu="triggerFileSelect(event)">
                <i data-lucide="user" class="profile-icon"></i>
            </div>
        </div>
        
        <input type="file" id="photo-upload" accept="image/*" style="display:none" onchange="previewFile(this)">

        <div class="library-menu">
            <div class="menu-item"><i data-lucide="music"></i> Playlists</div>
            <div class="menu-item"><i data-lucide="mic-2"></i> Artists</div>
            <div class="menu-item"><i data-lucide="disc"></i> Albums</div>
            <div class="menu-item"><i data-lucide="music-4"></i> Songs</div>
            <div class="menu-item"><i data-lucide="arrow-down-circle"></i> Downloaded</div>
        </div>

        <h2 class="section-title">Recently Added</h2>
        <div class="album-grid">
            <div class="album"><div class="album-art"></div><div class="album-name">Magic 2</div><div class="artist-name">Nas</div></div>
            <div class="album"><div class="album-art"></div><div class="album-name">King's Disease III</div><div class="artist-name">Nas</div></div>
        </div>
    </div>

    <div id="page-settings" class="page">
        <div class="page-header">
            <div class="back-button" onclick="goBack()"><i data-lucide="chevron-left"></i> Library</div>
            <h1 class="page-title">Settings</h1>
        </div>
    </div>
</div>

<nav id="bottom-nav">
    <div class="nav-item active" onclick="showPage('page-home', this)"><i data-lucide="home"></i><div class="nav-label">Home</div></div>
    <div class="nav-item" onclick="showPage('page-new', this)"><i data-lucide="layout-grid"></i><div class="nav-label">New</div></div>
    <div class="nav-item" onclick="showPage('page-library', this)"><i data-lucide="library"></i><div class="nav-label">Library</div></div>
</nav>

<script src="script.js"></script>
</body>
</html>
