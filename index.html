<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <title>iOS Music Player</title>
</head>
<body>

    <div id="content">
        <div id="page-home" class="page active">
            <div class="header-row">
                <h1>Home</h1>
                <div class="profile-container" onclick="openSettings()" oncontextmenu="triggerFileSelect(event)">
                    <i data-lucide="user" class="profile-icon"></i>
                    <input type="file" id="photo-upload" accept="image/*" style="display:none" onchange="previewFile(this)">
                </div>
            </div>
        </div>

        <div id="page-new" class="page">
            <div class="header-row">
                <h1>New</h1>
            </div>
        </div>

        <div id="page-library" class="page">
            <div class="header-row">
                <h1 class="page-title">Library</h1>
                <div class="header-actions">
                    <span class="edit-btn" onclick="toggleEdit()" id="edit-text">Edit</span>
                    <div class="profile-container" onclick="openSettings()">
                        <i data-lucide="user" class="profile-icon"></i>
                    </div>
                </div>
            </div>
            
          <div class="library-menu">
    <div class="menu-item" data-id="playlists"><i data-lucide="music"></i> Playlists</div>
    <div class="menu-item" data-id="artists"><i data-lucide="mic-2"></i> Artists</div>
    <div class="menu-item" data-id="albums"><i data-lucide="disc"></i> Albums</div>
    <div class="menu-item" data-id="songs"><i data-lucide="music"></i> Songs</div>
    
    <div class="menu-item" data-id="tv-movies"><i data-lucide="tv"></i> TV & Movies</div>
    <div class="menu-item" data-id="music-videos"><i data-lucide="monitor-play"></i> Music Videos</div>
    <div class="menu-item" data-id="genres"><i data-lucide="guitar"></i> Genres</div>
    <div class="menu-item" data-id="compilations"><i data-lucide="layers"></i> Compilations</div>
    <div class="menu-item" data-id="composers"><i data-lucide="music-4"></i> Composers</div>
    
    <div class="menu-item" data-id="downloaded"><i data-lucide="arrow-down-circle"></i> Downloaded</div>
</div>


            <h2 class="section-title">Recently Added</h2>
            <div class="album-grid">
                <div class="album">
                    <div class="album-art"></div>
                    <div class="album-name">Magic 2</div>
                    <div class="artist-name">Nas</div>
                </div>
                <div class="album">
                    <div class="album-art"></div>
                    <div class="album-name">King's Disease III</div>
                    <div class="artist-name">Nas</div>
                </div>
            </div>
        </div>

        <div id="page-settings" class="page">
    <!-- Close Button with Liquid Glass effect -->
    <div class="close-settings" onclick="closeSettings()">
        <i data-lucide="x"></i>
    </div>
    
    <div class="header-row">
        <h1 class="page-title">Settings</h1>
    </div>
    <!-- Removed "Back to Home" section -->
</div>


        <div id="page-search" class="page">
            <div class="header-row">
                <h1>Search</h1>
            </div>
        </div>
    </div>

    <div class="mini-player">
    <div class="mini-art"></div>
    <div class="mini-info">
        <div class="mini-title">Unknown Art</div>
        <div class="mini-sub">Not Playing</div>
    </div>
   <div class="mini-controls">
    <img src="https://img.icons8.com/ios-filled/24/ffffff/play--v1.png" class="mini-icon" alt="Play">
    <img src="https://img.icons8.com/ios-filled/24/ffffff/fast-forward.png" class="mini-icon" alt="Forward">
</div>

    </div>

 <nav id="bottom-nav">
    <div class="main-tabs" id="tab-container">
        <div class="tab-selector" id="active-selector"></div>
        <div class="nav-item active" onclick="showPage('page-home', this, 0)">
            <i data-lucide="home"></i><span class="nav-label">Home</span>
        </div>
        <div class="nav-item" onclick="showPage('page-new', this, 1)">
            <i data-lucide="layout-grid"></i><span class="nav-label">New</span>
        </div>
        <div class="nav-item" onclick="showPage('page-library', this, 2)">
            <i data-lucide="library"></i><span class="nav-label">Library</span>
        </div>
    </div>
    <div class="search-tab">
        <div class="nav-item" onclick="showPage('page-search', this, 3)">
            <i data-lucide="search"></i>
        </div>
    </div>
</nav>




    <script src="script.js"></script>
</body>
</html>
